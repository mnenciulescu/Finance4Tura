AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Finance4Tura \u2013 SAM backend"
Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
    - x86_64
    Environment:
      Variables:
        DYNAMODB_ENDPOINT:
          Ref: DynamoDbEndpoint
        INCOMES_TABLE: Incomes
        EXPENSES_TABLE: Expenses
Parameters:
  DynamoDbEndpoint:
    Type: String
    Default: ''
    Description: 'Override DynamoDB endpoint (e.g. http://localhost:8000 for local
      dev). Leave blank to use the real AWS DynamoDB endpoint.

      '
Resources:
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
        AllowHeaders: '''Content-Type,Authorization'''
        AllowOrigin: '''*'''
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/health.handler
      CodeUri: HealthFunction
      Events:
        HealthGet:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /health
            Method: GET
    Metadata:
      SamResourceId: HealthFunction
  IncomesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/incomes.handler
      CodeUri: IncomesFunction
      Events:
        IncomesPost:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /incomes
            Method: POST
        IncomesGet:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /incomes
            Method: GET
        IncomeGetById:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /incomes/{incomeId}
            Method: GET
        IncomePut:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /incomes/{incomeId}
            Method: PUT
        IncomeSeriesPut:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /incomes/{incomeId}/series
            Method: PUT
        IncomeDelete:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /incomes/{incomeId}
            Method: DELETE
    Metadata:
      SamResourceId: IncomesFunction
  ExpensesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/expenses.handler
      CodeUri: ExpensesFunction
      Events:
        ExpensesPost:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /expenses
            Method: POST
        ExpensesGet:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /expenses
            Method: GET
        ExpenseResolveIncome:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /expenses/resolve-income
            Method: GET
        ExpenseGetById:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /expenses/{expenseId}
            Method: GET
        ExpensePut:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /expenses/{expenseId}
            Method: PUT
        ExpenseSeriesPut:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /expenses/{expenseId}/series
            Method: PUT
        ExpenseDelete:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /expenses/{expenseId}
            Method: DELETE
    Metadata:
      SamResourceId: ExpensesFunction
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${Api}.execute-api.${AWS::Region}.amazonaws.com/Prod
