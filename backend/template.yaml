AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Finance4Tura – SAM backend

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [x86_64]
    Environment:
      Variables:
        DYNAMODB_ENDPOINT: !Ref DynamoDbEndpoint
        INCOMES_TABLE: Incomes
        EXPENSES_TABLE: Expenses
        SPLIT_PAYMENTS_TABLE: SplitPayments
        INV_OPERATIONS_TABLE: InvestmentOperations
        INV_SNAPSHOTS_TABLE: PortfolioSnapshots

Parameters:
  DynamoDbEndpoint:
    Type: String
    Default: ""
    Description: >
      Override DynamoDB endpoint (e.g. http://localhost:8000 for local dev).
      Leave blank to use the real AWS DynamoDB endpoint.
  CognitoUserPoolArn:
    Type: String
    Default: "arn:aws:cognito-idp:eu-central-1:980921747943:userpool/eu-central-1_CD7AdBFwQ"
    Description: ARN of the Cognito User Pool for API authorization.
  GoogleClientId:
    Type: String
    Default: ""
    Description: Google OAuth 2.0 Client ID for GIS token verification.
  AnthropicApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Anthropic API key for AI article summarisation (optional — falls back to sentence extraction if blank).

Resources:
  # ──────────────────────────────────────────
  # DynamoDB Tables
  # ──────────────────────────────────────────
  IncomesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Incomes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: incomeId
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: incomeId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: date-index
          KeySchema:
            - AttributeName: date
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ExpensesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Expenses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: expenseId
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: expenseId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: date-index
          KeySchema:
            - AttributeName: date
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InvestmentOperationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: InvestmentOperations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: operationId
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: operationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: date-index
          KeySchema:
            - AttributeName: date
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  PortfolioSnapshotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PortfolioSnapshots
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: snapshotId
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: snapshotId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: date-index
          KeySchema:
            - AttributeName: date
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  SplitPaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SplitPayments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: splitPaymentId
          AttributeType: S
      KeySchema:
        - AttributeName: splitPaymentId
          KeyType: HASH

  # ──────────────────────────────────────────
  # API Gateway
  # ──────────────────────────────────────────
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Ref CognitoUserPoolArn
      EndpointConfiguration:
        Type: REGIONAL
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Cache-Control: "'no-store'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Cache-Control: "'no-store'"

  # ──────────────────────────────────────────
  # Google Auth (public — no Cognito authorizer)
  # ──────────────────────────────────────────
  GoogleAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/googleAuth.handler
      CodeUri: .
      Timeout: 15
      Environment:
        Variables:
          USER_POOL_ID: eu-central-1_CD7AdBFwQ
          CLIENT_ID: 2nh5dljhrg9mq7nsmdg7cef21v
          GOOGLE_SECRET: c29f528e3852d9dc22c574996f7cfdf39093fbbc7054fabacb5797f8ef06f083
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminInitiateAuth
              Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/eu-central-1_CD7AdBFwQ"
      Events:
        GoogleAuthPost:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /auth/google
            Method: POST
            Auth:
              Authorizer: NONE

  # ──────────────────────────────────────────
  # Cognito Pre Sign-Up trigger (auto-confirm)
  # ──────────────────────────────────────────
  PreSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/preSignUp.handler
      CodeUri: .

  # ──────────────────────────────────────────
  # Health
  # ──────────────────────────────────────────
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/health.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncomesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ExpensesTable
      Events:
        HealthGet:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /health
            Method: GET

  # ──────────────────────────────────────────
  # Incomes (Phase 2 stubs)
  # ──────────────────────────────────────────
  IncomesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/incomes.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncomesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ExpensesTable
      Events:
        IncomesPost:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /incomes
            Method: POST
        IncomesGet:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /incomes
            Method: GET
        IncomeGetById:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /incomes/{incomeId}
            Method: GET
        IncomePut:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /incomes/{incomeId}
            Method: PUT
        IncomeSeriesPut:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /incomes/{incomeId}/series
            Method: PUT
        IncomeDelete:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /incomes/{incomeId}
            Method: DELETE

  # ──────────────────────────────────────────
  # Expenses (Phase 3 stubs)
  # ──────────────────────────────────────────
  ExpensesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/expenses.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncomesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ExpensesTable
      Events:
        ExpensesPost:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses
            Method: POST
        ExpensesGet:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses
            Method: GET
        ExpenseResolveIncome:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses/resolve-income
            Method: GET
        ExpenseGetById:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses/{expenseId}
            Method: GET
        ExpensePut:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses/{expenseId}
            Method: PUT
        ExpenseSeriesPut:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses/{expenseId}/series
            Method: PUT
        ExpenseDelete:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses/{expenseId}
            Method: DELETE

  # ──────────────────────────────────────────
  # Admin (user management — admin group only)
  # ──────────────────────────────────────────
  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/admin.handler
      CodeUri: .
      Timeout: 30
      Environment:
        Variables:
          USER_POOL_ID: eu-central-1_CD7AdBFwQ
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncomesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ExpensesTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:ListUsers
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminDeleteUser
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminRemoveUserFromGroup
                - cognito-idp:ListUsersInGroup
              Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/eu-central-1_CD7AdBFwQ"
      Events:
        AdminUsersGet:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /admin/users
            Method: GET
        AdminUserRolePut:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /admin/users/{username}/role
            Method: PUT
        AdminUserDelete:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /admin/users/{username}
            Method: DELETE

  # ──────────────────────────────────────────
  # Investments — Operations
  # ──────────────────────────────────────────
  InvestmentOperationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/investmentOperations.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InvestmentOperationsTable
      Events:
        InvOpsGet:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /investments/operations
            Method: GET
        InvOpsPost:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /investments/operations
            Method: POST
        InvOpPut:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /investments/operations/{operationId}
            Method: PUT
        InvOpDelete:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /investments/operations/{operationId}
            Method: DELETE

  # ──────────────────────────────────────────
  # Investments — Portfolio Snapshots
  # ──────────────────────────────────────────
  PortfolioSnapshotsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/portfolioSnapshots.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PortfolioSnapshotsTable
      Events:
        InvSnapsLatest:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /investments/snapshots/latest
            Method: GET
        InvSnapsGet:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /investments/snapshots
            Method: GET
        InvSnapsPost:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /investments/snapshots
            Method: POST
        InvSnapDelete:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /investments/snapshots/{snapshotId}
            Method: DELETE

  # ──────────────────────────────────────────
  # Split Payments
  # ──────────────────────────────────────────
  SplitPaymentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/splitPayments.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SplitPaymentsTable
      Events:
        SplitPaymentsGet:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /split-payments
            Method: GET
        SplitPaymentsPost:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /split-payments
            Method: POST
        SplitPaymentPut:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /split-payments/{splitPaymentId}
            Method: PUT
        SplitPaymentDelete:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /split-payments/{splitPaymentId}
            Method: DELETE

  # ──────────────────────────────────────────
  # AI News (public RSS aggregator)
  # ──────────────────────────────────────────
  AiNewsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getAiNews.handler
      CodeUri: .
      Timeout: 25
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
      Events:
        AiNewsGet:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /ai-news
            Method: GET
            Auth:
              Authorizer: NONE

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/Prod"
