AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Finance4Tura – SAM backend

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [x86_64]
    Environment:
      Variables:
        DYNAMODB_ENDPOINT: !Ref DynamoDbEndpoint
        INCOMES_TABLE: Incomes
        EXPENSES_TABLE: Expenses

Parameters:
  DynamoDbEndpoint:
    Type: String
    Default: ""
    Description: >
      Override DynamoDB endpoint (e.g. http://localhost:8000 for local dev).
      Leave blank to use the real AWS DynamoDB endpoint.
  CognitoUserPoolArn:
    Type: String
    Default: "arn:aws:cognito-idp:eu-central-1:980921747943:userpool/eu-central-1_CD7AdBFwQ"
    Description: ARN of the Cognito User Pool for API authorization.

Resources:
  # ──────────────────────────────────────────
  # DynamoDB Tables
  # ──────────────────────────────────────────
  IncomesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Incomes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: incomeId
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: incomeId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: date-index
          KeySchema:
            - AttributeName: date
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ExpensesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Expenses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: expenseId
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: expenseId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: date-index
          KeySchema:
            - AttributeName: date
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ──────────────────────────────────────────
  # API Gateway
  # ──────────────────────────────────────────
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Ref CognitoUserPoolArn

  # ──────────────────────────────────────────
  # Cognito Pre Sign-Up trigger (auto-confirm)
  # ──────────────────────────────────────────
  PreSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/preSignUp.mjs
      CodeUri: .

  # ──────────────────────────────────────────
  # Health
  # ──────────────────────────────────────────
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/health.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncomesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ExpensesTable
      Events:
        HealthGet:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /health
            Method: GET

  # ──────────────────────────────────────────
  # Incomes (Phase 2 stubs)
  # ──────────────────────────────────────────
  IncomesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/incomes.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncomesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ExpensesTable
      Events:
        IncomesPost:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /incomes
            Method: POST
        IncomesGet:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /incomes
            Method: GET
        IncomeGetById:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /incomes/{incomeId}
            Method: GET
        IncomePut:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /incomes/{incomeId}
            Method: PUT
        IncomeSeriesPut:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /incomes/{incomeId}/series
            Method: PUT
        IncomeDelete:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /incomes/{incomeId}
            Method: DELETE

  # ──────────────────────────────────────────
  # Expenses (Phase 3 stubs)
  # ──────────────────────────────────────────
  ExpensesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/expenses.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncomesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ExpensesTable
      Events:
        ExpensesPost:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses
            Method: POST
        ExpensesGet:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses
            Method: GET
        ExpenseResolveIncome:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses/resolve-income
            Method: GET
        ExpenseGetById:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses/{expenseId}
            Method: GET
        ExpensePut:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses/{expenseId}
            Method: PUT
        ExpenseSeriesPut:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses/{expenseId}/series
            Method: PUT
        ExpenseDelete:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses/{expenseId}
            Method: DELETE

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/Prod"
